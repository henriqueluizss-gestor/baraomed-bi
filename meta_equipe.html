<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meta BarãoMed">
<meta name="theme-color" content="#1E2761">
<title>Meta · BarãoMed</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Inter',sans-serif;}
body{background:linear-gradient(145deg,#1E2761 0%,#2d3e8a 55%,#1a5276 100%);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,16px) 20px env(safe-area-inset-bottom,16px);}

/* LOGO */
#logo{height:36px;margin-bottom:clamp(16px,4vh,32px);filter:brightness(0) invert(1);opacity:.9;}
@media(min-width:600px){#logo{height:48px;}}

/* TÍTULO */
.mes-label{font-size:11px;color:rgba(202,220,252,.5);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;text-align:center;}
.titulo{font-size:clamp(13px,3vw,16px);color:rgba(202,220,252,.7);margin-bottom:clamp(12px,3vh,24px);text-align:center;}

/* TOTAL DO DIA */
.total-wrap{display:flex;align-items:baseline;gap:10px;justify-content:center;margin-bottom:clamp(8px,2vh,16px);}
.total-n{font-size:clamp(56px,18vw,90px);font-weight:800;line-height:1;color:#fff;}
.total-l{font-size:16px;color:rgba(202,220,252,.6);}

/* META DO TIME */
.meta-box{width:100%;max-width:420px;background:rgba(255,255,255,.08);border:1px solid rgba(202,220,252,.15);border-radius:16px;padding:16px 20px;margin-bottom:clamp(12px,3vh,24px);}
.meta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.meta-label{font-size:11px;color:rgba(202,220,252,.5);text-transform:uppercase;letter-spacing:1px;}
.meta-nums{font-size:14px;font-weight:700;color:rgba(202,220,252,.9);}
.meta-emoji{font-size:22px;}
.meta-bar-track{height:10px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden;}
.meta-bar-fill{height:100%;border-radius:5px;transition:width 1s ease;background:linear-gradient(90deg,#4A90D9,#27AE60);}
.meta-bar-fill.atingida{background:linear-gradient(90deg,#27AE60,#7fff7f);}
.meta-sem{font-size:13px;color:rgba(202,220,252,.4);text-align:center;margin-bottom:20px;}

/* CARDS EMISSORES */
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;width:100%;max-width:480px;}
.card{background:rgba(255,255,255,.1);border:1px solid rgba(202,220,252,.2);border-radius:14px;padding:12px 16px;min-width:80px;text-align:center;transition:all .4s;flex:1;max-width:120px;}
.card.ativo{background:rgba(74,144,217,.3);border-color:rgba(74,144,217,.6);}
.card.meta-ok{background:rgba(39,174,96,.25);border-color:rgba(39,174,96,.6);}
.card-nome{font-size:10px;color:rgba(202,220,252,.7);font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-n{font-size:clamp(24px,7vw,34px);font-weight:800;color:#fff;line-height:1.1;margin:4px 0 2px;}
.card-pct{font-size:12px;font-weight:700;color:rgba(202,220,252,.85);}
.card-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle;}
.card-dot.on{background:#7fff7f;box-shadow:0 0 4px #7fff7f;}
.card-dot.off{background:rgba(202,220,252,.3);}
.card-meta-bar{height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;margin-top:5px;}
.card-meta-fill{height:100%;border-radius:2px;transition:width .8s ease;background:rgba(202,220,252,.5);}
.card-meta-fill.atingida{background:#7fff7f;}
.card-meta-txt{font-size:9px;color:rgba(202,220,252,.4);margin-top:2px;}

/* STATUS */
#status{position:fixed;bottom:0;left:0;right:0;background:rgba(30,39,97,.9);backdrop-filter:blur(8px);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:rgba(202,220,252,.7);}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
.sdot.ok{background:#27AE60;}.sdot.spin{background:#F39C12;animation:pulse .5s infinite;}.sdot.err{background:#E74C3C;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.refresh-btn{background:rgba(74,144,217,.3);border:1px solid rgba(202,220,252,.3);color:var(--ice,#CADCFC);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}

/* LOADING */
#loading{position:fixed;inset:0;background:linear-gradient(145deg,#1E2761,#1a5276);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .5s;}
#loading.hide{opacity:0;pointer-events:none;}
.ld-txt{font-size:13px;color:rgba(202,220,252,.6);}
.ld-track{width:180px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.ld-bar{height:100%;background:#4A90D9;border-radius:2px;animation:ldslide 1.2s ease-in-out infinite;}
@keyframes ldslide{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
</style>
</head>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwaIO8Ya2y3EFST6TcwoBHpxfh5MK2OVUvXFRCcGoNzvBuxsxVEL-RW6w4_kGeH0PCf/exec';
const REFRESH_MS = 3 * 60 * 1000;
const ABA_MAP = {1:'JANEIRO',2:'FEVEREIRO',3:'MARÇO',4:'ABRIL',5:'MAIO',6:'JUNHO',7:'JULHO',8:'AGOSTO',9:'SETEMBRO',10:'OUTUBRO',11:'NOVEMBRO',12:'DEZEMBRO'};

let isLoading = false;

// Arredonda para cima com folga de pelo menos 5
// 60→65, 61→70, 62→70, 65→70, 66→75
function roundUpNext5(n) {
  return Math.ceil((n + 5) / 5) * 5;
}


const now = new Date();
const mes = now.getMonth()+1, ano = now.getFullYear();

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1).toLowerCase() : s; }
function setText(id,v){ const e=document.getElementById(id); if(e) e.textContent=v; }
function setStatus(t,m){ document.getElementById('sdot').className='sdot '+t; setText('stxt',m); }

function fetchSheet(m, a) {
  return new Promise((resolve, reject) => {
    const sheetName = ABA_MAP[m]+'/'+a;
    const cb = 'cb_'+Date.now();
    const url = APPS_SCRIPT_URL+'?sheet='+encodeURIComponent(sheetName)+'&callback='+cb;
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 60000);
    function cleanup() { clearTimeout(timer); delete window[cb]; const s=document.getElementById('js_'+cb); if(s) s.remove(); }
    window[cb] = d => { cleanup(); d&&d.erro ? reject(new Error(d.erro)) : resolve(d); };
    const s = document.createElement('script');
    s.id = 'js_'+cb; s.src = url;
    s.onerror = () => { cleanup(); reject(new Error('Falha no Apps Script')); };
    document.head.appendChild(s);
  });
}

function processData(rows) {
  let hi = rows.findIndex(r=>r[0]&&String(r[0]).toUpperCase().includes('DATA'));
  if (hi<0) hi=0;
  const dataRows = rows.slice(hi+1).filter(r=>r[0]&&r[1]&&String(r[1]).trim()!=='EMISSOR');
  const emissorCount={}, diaCount={}, diaEmissor={};
  for (const row of dataRows) {
    const emissor = String(row[1]||'').trim().toUpperCase();
    if (!emissor) continue;
    const raw = row[0];
    let d,m2;
    if (raw instanceof Date || (typeof raw==='number')) {
      const dt = raw instanceof Date ? raw : new Date(Math.round((raw-25569)*86400000));
      d=dt.getUTCDate(); m2=dt.getUTCMonth()+1;
    } else {
      const s=String(raw);
      if(s.includes('T')){ const p=s.split('-'); d=parseInt(p[2]); m2=parseInt(p[1]); }
      else if(s.includes('/')){ const p=s.split('/'); d=parseInt(p[0]); m2=parseInt(p[1]); }
      else return;
    }
    if(isNaN(d)||isNaN(m2)) continue;
    const key = String(d).padStart(2,'0')+'/'+String(m2).padStart(2,'0');
    emissorCount[emissor]=(emissorCount[emissor]||0)+1;
    diaCount[key]=(diaCount[key]||0)+1;
    if(!diaEmissor[key]) diaEmissor[key]={};
    diaEmissor[key][emissor]=(diaEmissor[key][emissor]||0)+1;
  }
  return {emissorCount, diaCount, diaEmissor};
}

async function loadMeta() {
  if (isLoading) return;
  isLoading = true;
  setStatus('spin','Carregando…');
  setText('ld-txt','Conectando…');

  try {
    // Carrega mês atual
    const rows = await fetchSheet(mes, ano);
    const data = processData(rows);

    // Carrega mês anterior silenciosamente
    const mesAnt = mes===1?12:mes-1, anoAnt = mes===1?ano-1:ano;
    let diaCountHist = {...data.diaCount};
    let diaEmissorHist = {...data.diaEmissor};
    try {
      const rowsAnt = await fetchSheet(mesAnt, anoAnt);
      const dataAnt = processData(rowsAnt);
      Object.entries(dataAnt.diaCount).forEach(([k,v]) => diaCountHist['ant_'+k]=v);
      Object.entries(dataAnt.diaEmissor).forEach(([k,v]) => diaEmissorHist['ant_'+k]=v);
    } catch(e) {}

    // Data de hoje
    const hd = new Date();
    const hojeKey = String(hd.getDate()).padStart(2,'0')+'/'+String(hd.getMonth()+1).padStart(2,'0');
    const hojeData = data.diaEmissor[hojeKey] || {};
    const totalHoje = Object.values(hojeData).reduce((a,b)=>a+b,0);

    // Emissores do mês
    const emissores = Object.keys(data.emissorCount).sort((a,b)=>data.emissorCount[b]-data.emissorCount[a]);

    // Atualiza UI
    const nomeMes = ABA_MAP[mes];
    setText('mes-label', nomeMes.charAt(0)+nomeMes.slice(1).toLowerCase()+' '+ano);
    setText('titulo', 'Hoje · '+hojeKey);
    setText('total-n', totalHoje);

    // Meta
    const diasHist = Object.keys(diaCountHist)
      .filter(d => { const k=d.startsWith('ant_')?d.slice(4):d; return k!==hojeKey && diaCountHist[d]>0; })
      .sort((a,b) => {
        const pa=a.startsWith('ant_'), pb=b.startsWith('ant_');
        if(pa!==pb) return pa?-1:1;
        const [da2,ma2]=(a.startsWith('ant_')?a.slice(4):a).split('/').map(Number);
        const [db2,mb2]=(b.startsWith('ant_')?b.slice(4):b).split('/').map(Number);
        return ma2!==mb2?ma2-mb2:da2-db2;
      });

    // Meta do time — calculada automaticamente pela média dos últimos 2 meses
    const metaTime = diasHist.length > 0
      ? roundUpNext5(diasHist.reduce((s,d)=>s+diaCountHist[d],0) / diasHist.length)
      : 0;

    if (metaTime > 0 && totalHoje > 0) {
      const pct = Math.min(Math.round((totalHoje/metaTime)*100),100);
      const ok  = totalHoje >= metaTime;
      document.getElementById('meta-fill').style.width = pct+'%';
      document.getElementById('meta-fill').className = 'meta-bar-fill'+(ok?' atingida':'');
      setText('meta-nums', totalHoje+' / '+metaTime+' ('+pct+'%)');
      setText('meta-emoji', ok?'🏆🎉':pct>=75?'🔥':pct>=50?'💪':'🎯');
      document.getElementById('meta-box').style.display='';
      document.getElementById('meta-sem').style.display='none';
    } else if (metaTime > 0) {
      document.getElementById('meta-fill').style.width = '0%';
      document.getElementById('meta-fill').className = 'meta-bar-fill';
      setText('meta-nums', '0 / '+metaTime);
      setText('meta-emoji', '🎯');
      document.getElementById('meta-box').style.display='';
      document.getElementById('meta-sem').style.display='none';
    } else {
      document.getElementById('meta-box').style.display='none';
      document.getElementById('meta-sem').style.display='';
    }

    // Cards — só mostra emissores que já emitiram hoje
    const emissoresHoje = emissores.filter(nome => (hojeData[nome]||0) > 0);

    if (emissoresHoje.length === 0) {
      document.getElementById('cards').innerHTML =
        '<div style="font-size:13px;color:rgba(202,220,252,.35);text-align:center;padding:8px 0;">Nenhuma emissão ainda hoje</div>';
    } else if (metaTime > 0) {


      // Divide metaTime igualmente entre os presentes hoje
      // Se ímpar, o emissor com maior histórico leva +1
      const qtd = emissoresHoje.length;
      const base = Math.floor(metaTime / qtd);
      const sobra = metaTime - base * qtd;
      // Ordena por histórico (mais dias = mais experiente = leva a sobra)
      const ordenados = emissoresHoje.slice().sort((a,b) => {
        const dA = diasHist.filter(d=>(diaEmissorHist[d]?.[a]||0)>0).length;
        const dB = diasHist.filter(d=>(diaEmissorHist[d]?.[b]||0)>0).length;
        return dB - dA;
      });
      const metasIndiv = {};
      ordenados.forEach((nome, i) => {
        metasIndiv[nome] = base + (i < sobra ? 1 : 0);
      });

      document.getElementById('cards').innerHTML = emissoresHoje.map(nome => {
        const n    = hojeData[nome]||0;
        const pct  = totalHoje>0?((n/totalHoje)*100).toFixed(0)+'%':'–';
        const metaE = metasIndiv[nome] || 1;
        const pctE  = Math.min(Math.round((n/metaE)*100),100);
        const okE   = n >= metaE;
        const metaEmoji = okE ? '🏆' : '';
        const barHTML = `
          <div class="card-meta-bar">
            <div class="card-meta-fill ${okE?'atingida':''}" style="width:${pctE}%"></div>
          </div>
          <div class="card-meta-txt">meta ${metaE} · ${pctE}%</div>`;

        return `<div class="card ativo ${okE?'meta-ok':''}">
          <div class="card-nome"><span class="card-dot on"></span>${cap(nome)} ${metaEmoji}</div>
          <div class="card-n">${n}</div>
          <div class="card-pct">${pct}</div>
          ${barHTML}
        </div>`;
      }).join('');
    } else {
      // Sem meta definida — mostra cards sem barra
      document.getElementById('cards').innerHTML = emissoresHoje.map(nome => {
        const n   = hojeData[nome]||0;
        const pct = totalHoje>0?((n/totalHoje)*100).toFixed(0)+'%':'–';
        return `<div class="card ativo">
          <div class="card-nome"><span class="card-dot on"></span>${cap(nome)}</div>
          <div class="card-n">${n}</div>
          <div class="card-pct">${pct}</div>
          <div class="card-meta-txt" style="margin-top:6px;font-size:9px;color:rgba(202,220,252,.3);">Toque em "Meta do time" para definir</div>
        </div>`;
      }).join('');
    }

    setStatus('ok', 'Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
    document.getElementById('loading').classList.add('hide');

  } catch(e) {
    setStatus('err','Erro: '+e.message);
  }
  isLoading = false;
}

// ── Countdown ──────────────────────────────────────
let countdown = REFRESH_MS / 1000;
let countInterval;

function startCountdown() {
  clearInterval(countInterval);
  countdown = REFRESH_MS / 1000;
  countInterval = setInterval(() => {
    countdown--;
    const m = String(Math.floor(countdown/60)).padStart(1,'0');
    const s = String(countdown%60).padStart(2,'0');
    const el = document.getElementById('countdown');
    if (el) el.textContent = m+':'+s;
    if (countdown <= 0 && !isLoading) {
      loadMeta().then(() => startCountdown());
    }
  }, 1000);
}

function manualRefresh() {
  if (isLoading) return;
  clearInterval(countInterval);
  loadMeta().then(() => startCountdown());
}

// Auto-refresh
loadMeta().then(() => startCountdown());
</script>
